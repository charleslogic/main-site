<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Left speech bubble -->
  <rect x="12" y="22" width="38" height="28" rx="7" fill="white" opacity="0.9"/>
  <polygon points="18,50 26,50 18,60" fill="white" opacity="0.9"/>
  <!-- Right speech bubble -->
  <rect x="50" y="40" width="38" height="28" rx="7" fill="white" opacity="0.6"/>
  <polygon points="82,68 74,68 82,78" fill="white" opacity="0.6"/>
  <!-- Dots in left bubble -->
  <circle cx="26" cy="36" r="3" fill="#7c3aed"/>
  <circle cx="35" cy="36" r="3" fill="#7c3aed"/>
  <circle cx="44" cy="36" r="3" fill="#7c3aed"/>
  <!-- Dots in right bubble -->
  <circle cx="60" cy="54" r="3" fill="#4f46e5" opacity="0.7"/>
  <circle cx="69" cy="54" r="3" fill="#4f46e5" opacity="0.7"/>
  <circle cx="78" cy="54" r="3" fill="#4f46e5" opacity="0.7"/>
</svg>
