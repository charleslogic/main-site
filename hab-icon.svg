<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="22" fill="#0D0D12"/>
  <!-- Ring tracks (dim background) -->
  <circle cx="50" cy="50" r="34" fill="none" stroke="#1c3026" stroke-width="8"/>
  <circle cx="50" cy="50" r="24" fill="none" stroke="#2a1808" stroke-width="7"/>
  <circle cx="50" cy="50" r="14" fill="none" stroke="#0c1526" stroke-width="6"/>
  <!-- Outer ring: teal, ~80% complete -->
  <circle cx="50" cy="50" r="34" fill="none" stroke="#00C896" stroke-width="8"
          stroke-dasharray="171 42" stroke-linecap="round"
          transform="rotate(-90 50 50)"/>
  <!-- Middle ring: orange, ~65% complete -->
  <circle cx="50" cy="50" r="24" fill="none" stroke="#FF6B35" stroke-width="7"
          stroke-dasharray="98 53" stroke-linecap="round"
          transform="rotate(-90 50 50)"/>
  <!-- Inner ring: blue, ~50% complete -->
  <circle cx="50" cy="50" r="14" fill="none" stroke="#5B8DEF" stroke-width="6"
          stroke-dasharray="44 44" stroke-linecap="round"
          transform="rotate(-90 50 50)"/>
</svg>
